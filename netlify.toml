[build]
  publish = "."
  command = "npm ci --omit=dev && node build.js"

# SPA fallback: every route serves the app shell (hash-router handles views).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---- Global security headers (mirrors _headers) ----
[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; manifest-src 'self'; connect-src 'self' https://pagead2.googlesyndication.com; frame-src 'self' https://pagead2.googlesyndication.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"

# ---- Immutable static assets (1 year) ----
[[headers]]
  for = "/assets/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/script.min.js"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style.min.css"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style-deferred.min.css"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---- Service worker: always fresh ----
[[headers]]
  for = "/sw.js"
    [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ---- HTML: revalidate so updates ship fast ----
[[headers]]
  for = "/*.html"
    [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/google159ef9242b8ed752.html"
    [headers.values]
    Cache-Control = "public, max-age=86400"

# ---- SEO / ads / AI files: daily refresh ----
[[headers]]
  for = "/ads.txt"
    [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
    [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
    [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
    [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
    [headers.values]
    Cache-Control = "public, max-age=604800"
